# alertmanager.yml

global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "vamanpundit@gmail.com"
  smtp_auth_username: "vamanpundit@gmail.com"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

# ── ROUTING ────────────────────────────────────────────────────────────────────
route:
  receiver: "default-email"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: "slack-critical"
      group_wait: 10s

    - match_re:
        alertname: "(HighAppointmentCancellationRate|AppointmentBacklogTooHigh)"
      receiver: "slack-business"

# ── RECEIVERS ──────────────────────────────────────────────────────────────────
receivers:
  - name: "default-email"
    email_configs:
      - to: "dyesmuk@gmail.com"
        headers:
          subject: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"
        html: |
          {{ range .Alerts }}
          <b>Alert:</b> {{ .Annotations.summary }}<br/>
          <b>Description:</b> {{ .Annotations.description }}<br/>
          <b>Labels:</b> {{ range .Labels.SortedPairs }} {{ .Name }}={{ .Value }} {{ end }}
          <br/>
          {{ end }}

  - name: "slack-critical"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
        channel: "#clinic-alerts-critical"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: "slack-business"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
        channel: "#clinic-ops"

# ── INHIBITION ─────────────────────────────────────────────────────────────────
inhibit_rules:
  - source_match:
      alertname: "ClinicApiDown"
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["instance"]